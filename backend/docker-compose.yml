version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hommesestates-backend
    ports:
      - "8000:8000"
    environment:
      - APP_DATABASE_URL=sqlite:///./hommesestates.db
      - APP_REDIS_URL=redis://redis:6379
      - APP_JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - APP_FRONTEND_URL=http://localhost:3000
      - APP_BACKEND_URL=http://localhost:8000
      - APP_SMTP_HOST=smtp.gmail.com
      - APP_SMTP_PORT=587
      - APP_SMTP_USER=your-email@gmail.com
      - APP_SMTP_PASSWORD=your-app-password
      - APP_EMAIL_FROM=noreply@hommesestates.com
    volumes:
      - ./storage:/app/storage
      - ./hommesestates.db:/app/hommesestates.db
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - hommesestates-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hommesestates-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - hommesestates-network
    command: redis-server --appendonly yes

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: hommesestates-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - hommesestates-network

volumes:
  redis_data:
    driver: local

networks:
  hommesestates-network:
    driver: bridge
